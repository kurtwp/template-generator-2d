<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 Scale Print Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex overflow-hidden selection:bg-brand-500 selection:text-white">

    <!-- Glassmorphism Sidebar UI -->
    <aside id="sidebar" class="w-80 bg-slate-800/80 backdrop-blur-xl border-r border-slate-700 shadow-2xl z-10 flex flex-col hide-on-print h-full transition-all duration-300">
        <div class="p-6 border-b border-slate-700/50 bg-slate-800/40">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-br from-brand-400 to-indigo-400 mb-1 tracking-tight">Print Designer</h1>
            <p class="text-sm text-brand-200/60 font-medium">1:1 Precision Scaling</p>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
            <!-- Paper Details -->
            <section class="group">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-brand-500 group-hover:scale-125 transition-transform"></div>
                    Workspace
                </h2>
                <div class="bg-slate-900/50 rounded-xl p-4 border border-slate-700/50 hover:border-brand-500/30 transition-colors">
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-slate-300 mb-2">Paper Format</label>
                        <div class="flex gap-2">
                            <select id="paperSize" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all">
                                <option value="letter">Letter (8.5" x 11")</option>
                                <option value="legal">Legal (8.5" x 14")</option>
                            </select>
                            <button id="clearCanvasBtn" class="flex items-center justify-center bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg px-3 py-2 text-sm font-semibold transition-all active:scale-95" title="Clear Canvas">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <label class="block text-sm font-medium text-slate-300 mb-2">Orientation</label>
                    <select id="orientation" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all appearance-none cursor-pointer hover:bg-slate-700">
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Landscape</option>
                    </select>
                </div>
            </section>

            <!-- Grid Settings -->
            <section class="group">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-indigo-500 group-hover:scale-125 transition-transform"></div>
                        Grid Control
                    </h2>
                    <button id="toggleGridBtn" class="text-xs font-medium text-indigo-400 hover:text-white transition-colors bg-indigo-500/10 hover:bg-indigo-500/30 px-3 py-1.5 rounded-full border border-indigo-500/20 active:scale-95">Visible On</button>
                </div>
                <div class="bg-slate-900/50 rounded-xl p-4 border border-slate-700/50 hover:border-indigo-500/30 transition-colors">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Snap Increment</label>
                    <select id="snapIncrement" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none cursor-pointer hover:bg-slate-700 mb-3">
                        <option value="0.125">0.125" (1/8)</option>
                        <option value="0.25" selected>0.25" (1/4)</option>
                        <option value="0.5">0.5" (1/2)</option>
                        <option value="1.0">1.0"</option>
                    </select>

                    <label class="block text-sm font-medium text-slate-300 mb-2">Grid Style</label>
                    <select id="gridStyle" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none cursor-pointer hover:bg-slate-700">
                        <option value="solid">Solid</option>
                        <option value="dashed">Dashed</option>
                    </select>
                </div>
            </section>

            <!-- Shape Tool -->
            <section class="group">
                 <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 group-hover:scale-125 transition-transform"></div>
                    Elements
                </h2>
                
                <div class="mb-4 bg-slate-900/50 rounded-xl p-4 border border-slate-700/50 hover:border-brand-500/30 transition-colors">
                    <label class="block text-xs font-medium text-slate-300 mb-2">Active Tool</label>
                    <div class="grid grid-cols-2 gap-2 w-full">
                        <button class="tool-btn active bg-brand-600 border border-brand-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.2)] transition-all rounded-lg py-2 text-xs font-semibold active:scale-95" data-tool="cursor">Cursor</button>
                        <button class="tool-btn bg-slate-800 border border-slate-600 hover:border-brand-500 hover:bg-slate-700 hover:text-white transition-all rounded-lg py-2 text-xs font-semibold text-slate-300 active:scale-95 flex items-center justify-center gap-1" data-tool="measure">Measure</button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-300 mb-2">Geometric Primitives</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button class="shape-type-btn bg-brand-600 text-white border border-brand-500 rounded-lg px-2 py-1.5 text-xs font-medium shadow-[0_0_15px_rgba(59,130,246,0.2)] transition-all" data-type="cross">Cross</button>
                        <button class="shape-type-btn bg-slate-800 text-slate-300 border border-slate-600 rounded-lg px-2 py-1.5 text-xs font-medium hover:bg-slate-700 transition-all" data-type="square">Square</button>
                        <button class="shape-type-btn bg-slate-800 text-slate-300 border border-slate-600 rounded-lg px-2 py-1.5 text-xs font-medium hover:bg-slate-700 transition-all" data-type="circle">Circle</button>
                        <button class="shape-type-btn bg-slate-800 text-slate-300 border border-slate-600 rounded-lg px-2 py-1.5 text-xs font-medium hover:bg-slate-700 transition-all" data-type="rectangle">Rectangle</button>
                        <button class="shape-type-btn bg-slate-800 text-slate-300 border border-slate-600 rounded-lg px-2 py-1.5 text-xs font-medium hover:bg-slate-700 transition-all" data-type="oval">Oval</button>
                        <button class="shape-type-btn bg-slate-800 text-slate-300 border border-slate-600 rounded-lg px-2 py-1.5 text-xs font-medium hover:bg-slate-700 transition-all" data-type="line">Line</button>
                        <button class="shape-type-btn col-span-3 bg-slate-800 text-slate-300 border border-slate-600 rounded-lg px-2 py-1.5 text-xs font-medium hover:bg-slate-700 transition-all" data-type="text">Text Node</button>
                    </div>
                    <div class="mt-3">
                        <label class="block text-xs font-medium text-slate-300 mb-2">Stroke Control</label>
                        <select id="shapeStyle" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-2 text-xs text-white focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all appearance-none cursor-pointer">
                            <option value="solid">Solid Stroke</option>
                            <option value="dashed">Dashed Stroke</option>
                        </select>
                    </div>
                </div>
                    
                    <!-- Shape Size -->
                    <div class="pt-2 border-t border-slate-700/50">
                        <label class="block text-xs font-medium text-slate-300 mb-2">Add to Canvas</label>
                        <div class="flex gap-2 w-full">
                            <button class="add-shape-btn flex-1 bg-slate-800 border border-slate-600 hover:border-emerald-500 hover:bg-slate-700 hover:text-white hover:shadow-[0_0_15px_rgba(16,185,129,0.2)] transition-all rounded-lg py-2 text-xs font-semibold text-slate-300 active:scale-95" data-size="0.25">0.25"</button>
                            <button class="add-shape-btn flex-1 bg-slate-800 border border-slate-600 hover:border-emerald-500 hover:bg-slate-700 hover:text-white hover:shadow-[0_0_15px_rgba(16,185,129,0.2)] transition-all rounded-lg py-2 text-xs font-semibold text-slate-300 active:scale-95" data-size="0.5">0.5"</button>
                            <button class="add-shape-btn flex-1 bg-slate-800 border border-slate-600 hover:border-emerald-500 hover:bg-slate-700 hover:text-white hover:shadow-[0_0_15px_rgba(16,185,129,0.2)] transition-all rounded-lg py-2 text-xs font-semibold text-slate-300 active:scale-95" data-size="1.0">1.0"</button>
                        </div>
                    </div>
                    
                    <!-- Distribute -->
                    <div class="bg-slate-900/50 rounded-xl p-4 border border-slate-700/50 mt-4">
                        <label class="block text-xs font-medium text-slate-300 mb-3">Distribute Evenly</label>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="shapeCount" value="5" min="1" max="20" class="w-16 bg-slate-800 border border-slate-600 rounded-lg px-2 py-2 text-sm text-center text-white focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                            <select id="distributeSize" class="w-20 bg-slate-800 border border-slate-600 rounded-lg px-2 py-2 text-xs text-white focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all appearance-none cursor-pointer">
                                <option value="0.25">0.25"</option>
                                <option value="0.5">0.5"</option>
                                <option value="1.0" selected>1.0"</option>
                            </select>
                            <button id="distributeBtn" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white shadow-[0_4px_20px_rgba(16,185,129,0.3)] rounded-lg py-2 text-sm font-semibold transition-all transform hover:-translate-y-0.5 active:scale-95 active:translate-y-0">Align</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Selected Element Settings (Hidden by default) -->
            <section id="selectedElementSection" class="group hidden">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-amber-500 group-hover:scale-125 transition-transform"></div>
                    Selected Shape
                </h2>
                <div class="bg-slate-900/50 rounded-xl p-4 border border-amber-500/30">
                    <div id="selectedDimensionSection" class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-xs font-medium text-slate-300">Dimensions (In)</label>
                            <label class="flex items-center gap-1.5 cursor-pointer text-[10px] text-slate-400 hover:text-slate-200">
                                <input type="checkbox" id="constrainProportions" class="rounded border-slate-600 bg-slate-800 text-amber-500 focus:ring-amber-500" checked>
                                Constrain
                            </label>
                        </div>
                        <div class="flex gap-2">
                            <div class="flex-1">
                                <label class="block text-[10px] text-slate-500 mb-1">Width</label>
                                <input type="number" step="0.125" min="0.125" max="100" id="selectedShapeW" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all font-mono text-center">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-slate-500 mb-1">Height</label>
                                <input type="number" step="0.125" min="0.125" max="100" id="selectedShapeH" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all font-mono text-center">
                            </div>
                        </div>
                    </div>
                    
                    <div id="selectedTextSection" class="mb-4 hidden">
                        <label class="block text-[10px] text-slate-500 mb-1">Text Value</label>
                        <input type="text" id="selectedShapeText" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all mb-3">
                        <div class="flex gap-2">
                            <div class="flex-1">
                                <label class="block text-[10px] text-slate-500 mb-1">Font Family</label>
                                <select id="selectedShapeFont" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all cursor-pointer">
                                    <option value="Arial, sans-serif">Arial</option>
                                    <option value="'Times New Roman', serif">Times New Roman</option>
                                    <option value="'Courier New', monospace">Courier</option>
                                    <option value="Verdana, sans-serif">Verdana</option>
                                    <option value="Georgia, serif">Georgia</option>
                                </select>
                            </div>
                            <div class="w-1/3">
                                <label class="block text-[10px] text-slate-500 mb-1">Size (pt)</label>
                                <input type="number" id="selectedShapeFontSize" value="24" step="1" min="8" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all font-mono text-center">
                            </div>
                        </div>
                    </div>

                    <button id="deleteShapeBtn" class="w-full flex justify-center items-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 hover:border-red-500 transition-all rounded-lg py-2 text-sm font-semibold active:scale-95 group">
                        <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Delete Shape
                    </button>
                    <p class="text-[10px] text-slate-500 mt-3 text-center leading-relaxed">Or press <kbd class="px-1 py-0.5 rounded bg-slate-800 border border-slate-700">Del</kbd> / <kbd class="px-1 py-0.5 rounded bg-slate-800 border border-slate-700">Bksp</kbd>.<br>Tip: You can drag the bottom-right corner of objects to resize via mouse.</p>
                </div>
            </section>
        </div>

        <div class="p-6 border-t border-slate-700/50 bg-slate-800/80 backdrop-blur-md">
            <button onclick="window.print()" class="w-full relative group overflow-hidden bg-brand-600 hover:bg-brand-500 text-white rounded-xl py-3.5 font-bold shadow-[0_0_20px_rgba(59,130,246,0.3)] flex justify-center items-center gap-2 transition-all transform hover:-translate-y-1 active:scale-95 active:translate-y-0 border border-brand-400/30">
                <div class="absolute inset-0 bg-white/20 w-full transform -skew-x-12 -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-in-out"></div>
                <svg class="w-5 h-5 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                <span class="relative z-10">Print 1:1 Scale</span>
            </button>
        </div>
    </aside>

    <!-- Canvas Workspace -->
    <!-- Added subtle radial gradient to background for aesthetics -->
    <main class="flex-1 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-700 via-slate-900 to-black overflow-auto flex justify-center items-center relative custom-scrollbar print-workspace" id="mainContainer">
        
        <!-- The canvas container that acts as a physical paper -->
        <div id="paper" class="bg-white relative transition-all duration-300 print-paper group">
            <div class="absolute inset-0 shadow-[0_0_50px_rgba(0,0,0,0.5)] pointer-events-none group-hover:shadow-[0_0_70px_rgba(59,130,246,0.15)] transition-shadow duration-500 print-shadow-hide"></div>
            <canvas id="designCanvas" class="relative z-10"></canvas>
        </div>
    </main>

    <!-- Modularized Mechanics Application Script -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
